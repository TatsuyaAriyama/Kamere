name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/kamere-home-video-playback-blptgt
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに絞る（古いデプロイは進行中でもキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # プロジェクトサイトのパス（https://<user>.github.io/Kamere/）
          VITE_BASE: /Kamere/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Pages 未設定でもワークフローから自動で有効化（Source = GitHub Actions）
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
